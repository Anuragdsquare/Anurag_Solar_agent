name: Hourly Solar Agent

on:
  schedule:
    # 2:30 UTC se 11:30 UTC (8:00 AM IST se 5:00 PM IST tak)
    - cron: '30 2-11 * * *'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests schedule

      - name: Run the script
        run: python main.py
        
