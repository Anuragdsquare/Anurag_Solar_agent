name: Anurag's Hourly Solar Agent

on:
  schedule:
    - cron: '0 * * * *' # हर घंटे रन करने के लिए
  workflow_dispatch: # मैन्युअल रन बटन के लिए

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: pip install requests
        
      - name: Run Script
        run: python main.py # यहाँ अपनी Python फ़ाइल का सही नाम लिखें
        
